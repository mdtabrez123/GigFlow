server {
    listen 80;
    server_name _;

    # Serve the React SPA build
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Routing ────────────────────────────────────────────────────────────
    # All non-file routes fall through to index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ──────────────────────────────────────────────────────────────
    # Forward /api/* requests to the backend container.
    # "backend" is the docker-compose service name — Docker's internal DNS
    # resolves it automatically.
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-alive for WebSocket / SSE support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # ── Security Headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Static Asset Caching ───────────────────────────────────────────────────
    # Cache Vite's hashed assets aggressively; they change name on every build.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Suppress noisy favicon 404 in logs
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # ── Gzip Compression ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;
}
